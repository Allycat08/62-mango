<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Empire - Persistent Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #10b981;
            --dark: #000000;
            --light-dark: #0a0a0a;
            --border: #1f1f1f;
        }
        body {
            background-color: var(--dark);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .card-container {
            background: var(--light-dark);
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-tab.active { border-bottom: 2px solid #fff; color: #fff; }
        
        /* 3D Card Interaction */
        .card-wrapper { perspective: 1000px; cursor: pointer; width: 100%; }
        .debit-card {
            background: linear-gradient(135deg, #111 0%, #000 100%);
            border: 1px solid #333;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            aspect-ratio: 1.6 / 1;
        }
        .chip {
            width: 45px; height: 35px;
            background: linear-gradient(135deg, #d4af37 0%, #f9e29c 100%);
            border-radius: 6px;
        }

        .mini-card {
            height: 160px; border-radius: 16px; padding: 1.5rem;
            display: flex; flex-direction: column; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1); position: relative;
        }
        .mini-card.owned { border-color: #10b981; background: rgba(16, 185, 129, 0.05); }

        .modal-overlay {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 100;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        #save-indicator {
            position: fixed; top: 20px; right: 20px;
            background: #10b981; color: white;
            padding: 6px 12px; border-radius: 6px;
            font-size: 10px; font-weight: 800;
            opacity: 0; transition: opacity 0.3s;
            z-index: 1000; pointer-events: none;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="save-indicator">CLOUD SYNC ACTIVE</div>

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-3">
            <svg width="40" height="40" viewBox="0 0 76 65"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="white"/></svg>
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase">Vercel <span class="text-slate-500">Empire</span></h1>
                <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Session Persistence Enabled</p>
            </div>
        </div>
        <div class="flex gap-4 items-center bg-zinc-900 p-4 rounded-xl border border-zinc-800 w-full md:w-auto">
            <div class="text-center px-4 border-r border-zinc-800 flex-1">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Liquidity</p>
                <p id="balance-display" class="text-xl font-mono font-bold text-white">$0</p>
            </div>
            <div class="text-center px-4 flex-1">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Revenue/Hr</p>
                <p id="income-display" class="text-xl font-mono font-bold text-emerald-500">+$0</p>
            </div>
        </div>
    </header>

    <nav class="max-w-6xl mx-auto flex overflow-x-auto gap-4 mb-8 border-b border-zinc-800">
        <button onclick="switchTab('dashboard')" class="btn-tab active pb-2 px-4 font-bold text-sm text-slate-500 uppercase">Dashboard</button>
        <button onclick="switchTab('stocks')" class="btn-tab pb-2 px-4 font-bold text-sm text-slate-500 uppercase">Markets</button>
        <button onclick="switchTab('banking')" class="btn-tab pb-2 px-4 font-bold text-sm text-slate-500 uppercase">Account</button>
    </nav>

    <main class="max-w-6xl mx-auto">
        <div id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <div class="card-wrapper" id="card-3d-container">
                        <div id="revenue-card" onclick="handleManualClick(event)" class="debit-card p-8 flex flex-col justify-between">
                            <div class="flex justify-between items-start">
                                <div class="chip"></div>
                                <div class="text-right text-[8px] text-zinc-600 font-bold uppercase">Corporate ID: <span id="user-id-display">0000</span></div>
                            </div>
                            <div>
                                <p class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">Available Funds</p>
                                <h2 id="card-balance" class="text-4xl md:text-5xl font-mono font-bold text-white tracking-tighter">$0.00</h2>
                            </div>
                            <div class="flex justify-between items-end">
                                <div><p class="text-[10px] text-zinc-500 uppercase font-bold">Level <span id="card-level">1</span> Founder</p></div>
                                <div class="text-right"><p id="card-income" class="text-sm font-mono text-emerald-500">+$0/hr</p></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="card-container p-6 flex flex-col justify-center text-center">
                    <p class="text-[10px] text-slate-500 uppercase font-bold mb-2">Net Worth</p>
                    <p id="networth-display" class="text-4xl font-black text-white">$0</p>
                    <div class="mt-6 space-y-2 text-left">
                        <div class="flex justify-between text-[10px] font-bold uppercase">
                            <span class="text-zinc-500">Experience</span>
                            <span id="xp-text" class="text-white">0 / 200</span>
                        </div>
                        <div class="w-full bg-zinc-900 h-2 rounded-full overflow-hidden border border-zinc-800">
                            <div id="xp-bar" class="bg-white h-full transition-all" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="stocks" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="stock-list"></div>
        </div>

        <div id="banking" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="card-market"></div>
            <div class="mt-12 text-center">
                <button onclick="confirmReset()" class="text-[10px] text-zinc-700 hover:text-red-500 font-bold uppercase tracking-widest transition">Wipe Local Database</button>
            </div>
        </div>
    </main>

    <!-- UI Modals -->
    <div id="reset-modal" class="modal-overlay fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-red-900/30 rounded-2xl p-8 w-full max-w-sm shadow-2xl text-center">
            <h2 class="text-xl font-black text-white mb-2 uppercase">Erase Data?</h2>
            <p class="text-zinc-500 text-sm mb-6">This will permanently delete your empire and reset all progress.</p>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeResetModal()" class="py-3 rounded-xl bg-zinc-800 text-zinc-400 font-bold text-xs uppercase">Cancel</button>
                <button onclick="resetGame()" class="py-3 rounded-xl bg-red-600 text-white font-black text-xs uppercase">Reset</button>
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'VERCEL_EMPIRE_SAVE_V1';
        
        let state = {
            balance: 1000,
            income: 0,
            level: 1, xp: 0, xpNext: 200,
            lastSave: Date.now(),
            cards: [
                { id: 'c1', name: 'Standard Grey', price: 0, mult: 1, owned: true, color: 'bg-zinc-900' },
                { id: 'c2', name: 'Emerald Plus', price: 5000, mult: 2.5, owned: false, color: 'bg-emerald-950' },
                { id: 'c3', name: 'Obsidian Black', price: 50000, mult: 10, owned: false, color: 'bg-black' }
            ],
            stocks: [
                { id: 'VRC', name: 'Vercel Corp', price: 150, owned: 0, history: [140, 145, 150] },
                { id: 'NDV', name: 'Node Ventures', price: 80, owned: 0, history: [85, 82, 80] },
                { id: 'RXT', name: 'React Tech', price: 320, owned: 0, history: [310, 315, 320] }
            ]
        };

        // Persistence Logic
        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            const indicator = document.getElementById('save-indicator');
            indicator.style.opacity = '1';
            setTimeout(() => indicator.style.opacity = '0', 2000);
        }

        function load() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                // Selective merge to ensure new game features aren't lost but progress is kept
                state = { ...state, ...parsed };
                // Ensure array lengths match in case of updates
                state.stocks = state.stocks.map((s, i) => ({ ...state.stocks[i], ...s }));
            }
        }

        function format(n) { return '$' + Math.floor(n).toLocaleString(); }

        function updateUI() {
            document.getElementById('balance-display').innerText = format(state.balance);
            document.getElementById('card-balance').innerText = format(state.balance);
            document.getElementById('income-display').innerText = `+${format(state.income)}/hr`;
            document.getElementById('card-income').innerText = `+${format(state.income)}/hr`;
            document.getElementById('card-level').innerText = state.level;
            
            const xpPct = (state.xp / state.xpNext) * 100;
            document.getElementById('xp-bar').style.width = xpPct + '%';
            document.getElementById('xp-text').innerText = `${Math.floor(state.xp)} / ${state.xpNext}`;
            
            let nw = state.balance;
            state.stocks.forEach(s => nw += (s.owned * s.price));
            document.getElementById('networth-display').innerText = format(nw);

            if (document.getElementById('stocks').classList.contains('active')) renderStocks();
            if (document.getElementById('banking').classList.contains('active')) renderBanking();
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
            updateUI();
        }

        function handleManualClick(e) {
            let mult = 1;
            state.cards.forEach(c => { if(c.owned) mult = Math.max(mult, c.mult); });
            
            state.balance += (10 * state.level * mult);
            state.xp += 2;
            if(state.xp >= state.xpNext) {
                state.level++;
                state.xp = 0;
                state.xpNext = Math.floor(state.xpNext * 1.5);
            }
            updateUI();
        }

        function renderStocks() {
            const container = document.getElementById('stock-list');
            container.innerHTML = '';
            state.stocks.forEach(s => {
                const div = document.createElement('div');
                div.className = 'card-container p-6';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <div><h3 class="font-bold text-white">${s.name}</h3><p class="text-[10px] text-zinc-500 uppercase">${s.id}</p></div>
                        <div class="text-right"><p class="font-mono font-bold text-white">${format(s.price)}</p></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="buyStock('${s.id}')" class="flex-1 bg-white text-black py-2 rounded text-[10px] font-bold uppercase">Buy 1</button>
                        <button onclick="sellStock('${s.id}')" class="flex-1 bg-zinc-900 border border-zinc-800 text-zinc-400 py-2 rounded text-[10px] font-bold uppercase">Sell (${s.owned})</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function buyStock(id) {
            const s = state.stocks.find(x => x.id === id);
            if(state.balance >= s.price) {
                state.balance -= s.price;
                s.owned++;
                updateUI();
                save();
            }
        }

        function sellStock(id) {
            const s = state.stocks.find(x => x.id === id);
            if(s.owned > 0) {
                state.balance += s.price;
                s.owned--;
                updateUI();
                save();
            }
        }

        function renderBanking() {
            const container = document.getElementById('card-market');
            container.innerHTML = '';
            state.cards.forEach(c => {
                const div = document.createElement('div');
                div.className = `mini-card ${c.color} ${c.owned ? 'owned' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between"><div class="chip w-8 h-6"></div><span class="text-[8px] font-bold text-zinc-500">TIER ${c.mult}x</span></div>
                    <div class="text-white font-bold text-sm uppercase">${c.name}</div>
                    ${!c.owned ? `<button onclick="buyCard('${c.id}')" class="w-full bg-white text-black py-2 rounded text-[10px] font-bold">UPGRADE ${format(c.price)}</button>` : `<span class="text-[10px] text-emerald-500 font-bold text-center">CURRENTLY ACTIVE</span>`}
                `;
                container.appendChild(div);
            });
        }

        function buyCard(id) {
            const c = state.cards.find(x => x.id === id);
            if(state.balance >= c.price) {
                state.balance -= c.price;
                c.owned = true;
                updateUI();
                save();
            }
        }

        function confirmReset() { document.getElementById('reset-modal').classList.add('active'); }
        function closeResetModal() { document.getElementById('reset-modal').classList.remove('active'); }
        function resetGame() { localStorage.removeItem(STORAGE_KEY); location.reload(); }

        // Core Loops
        window.onload = () => {
            load();
            updateUI();

            // 3D Card tilt
            const card = document.getElementById('revenue-card');
            const wrap = document.getElementById('card-3d-container');
            wrap.onmousemove = (e) => {
                const rect = wrap.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                card.style.transform = `rotateY(${x * 20}deg) rotateX(${-y * 20}deg)`;
            };
            wrap.onmouseleave = () => card.style.transform = `rotate(0)`;

            // Market fluctuation
            setInterval(() => {
                state.stocks.forEach(s => {
                    s.price *= (1 + (Math.random() - 0.48) * 0.04);
                });
                if(document.getElementById('stocks').classList.contains('active')) renderStocks();
            }, 5000);

            // Passive Revenue
            setInterval(() => {
                if(state.income > 0) {
                    state.balance += (state.income / 3600);
                    updateUI();
                }
            }, 1000);

            // Auto-Save every 10 seconds
            setInterval(save, 10000);
        };
    </script>
</body>
</html>
