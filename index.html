<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vercel Empire - Blue Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #10b981;
            --secondary: #3b82f6;
            --dark: #020617; /* Deep Dark Blue */
            --light-dark: #0f172a;
            --border: #1e293b;
        }
        body {
            background-color: var(--dark);
            color: #f8fafc;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }
        .card-container {
            background: var(--light-dark);
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .btn-tab.active {
            border-bottom: 2px solid #fff;
            color: #fff;
        }
        
        .viewport-3d { perspective: 1000px; width: 100%; max-width: 400px; height: 250px; }
        .credit-card {
            width: 100%; height: 100%; position: relative;
            transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            border-radius: 20px;
        }
        .card-face {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 20px; padding: 25px; display: flex; flex-direction: column;
            justify-content: space-between; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .card-gold { background: linear-gradient(135deg, #f59e0b 0%, #78350f 100%); }
        .card-platinum { background: linear-gradient(135deg, #94a3b8 0%, #1e293b 100%); }
        .card-black { background: linear-gradient(135deg, #111 0%, #444 100%); border: 1px solid #555; }
        
        .chip { width: 50px; height: 40px; background: linear-gradient(135deg, #fbbf24 0%, #b45309 100%); border-radius: 8px; }

        .progress-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; transition: width 0.3s ease; }

        .click-btn { transition: transform 0.1s; cursor: pointer; user-select: none; }
        .click-btn:active { transform: scale(0.98); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-3">
            <svg width="40" height="40" viewBox="0 0 76 65" fill="none"><path d="M37.5274 0L75.0548 65H0L37.5274 0Z" fill="white"/></svg>
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-white">VERCEL <span class="text-blue-500">EMPIRE</span></h1>
                <p class="text-slate-500 text-xs uppercase tracking-widest font-bold">Level <span id="legacy-level">1</span> Developer</p>
            </div>
        </div>
        <div class="flex gap-4 items-center bg-slate-900/50 p-4 rounded-xl border border-slate-800 w-full md:w-auto">
            <div class="text-center px-4 border-r border-slate-800">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Cash</p>
                <p id="balance-display" class="text-xl font-mono font-bold text-white">$0</p>
            </div>
            <div class="text-center px-4">
                <p class="text-[10px] text-slate-500 uppercase font-bold">Net Worth</p>
                <p id="networth-display" class="text-xl font-mono font-bold text-emerald-400">$0</p>
            </div>
        </div>
    </header>

    <nav class="max-w-6xl mx-auto flex gap-4 mb-8 border-b border-slate-800">
        <button onclick="switchTab('dashboard')" class="btn-tab active pb-2 px-4 font-bold text-sm text-slate-400">DASHBOARD</button>
        <button onclick="switchTab('stocks')" class="btn-tab pb-2 px-4 font-bold text-sm text-slate-400">MARKETS</button>
        <button onclick="switchTab('banking')" class="btn-tab pb-2 px-4 font-bold text-sm text-slate-400">UPGRADES</button>
    </nav>

    <main class="max-w-6xl mx-auto">
        
        <div id="dashboard" class="tab-content active space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1 flex flex-col items-center justify-center">
                    <div id="wealth-clicker" onclick="handleManualClick()" class="click-btn card-container p-8 w-full h-[250px] flex flex-col items-center justify-center border-2 border-blue-500/20 hover:border-blue-500/50 group">
                        <p class="text-[10px] text-blue-400 font-bold uppercase mb-2">Click to Deploy</p>
                        <p id="click-value" class="text-4xl font-black text-white tracking-tighter">$5</p>
                        <div id="click-cooldown-ui" class="mt-4 w-24 h-1 bg-slate-800 rounded-full overflow-hidden">
                            <div id="cooldown-progress" class="h-full bg-blue-500 w-full"></div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="card-container p-6 bg-slate-900/30">
                        <div class="flex justify-between text-xs mb-2">
                            <span class="text-slate-400 font-bold uppercase">Experience (XP)</span>
                            <span id="xp-text" class="text-white font-mono">0 / 1000</span>
                        </div>
                        <div class="progress-bar"><div id="xp-fill" class="progress-fill" style="width: 0%"></div></div>
                    </div>
                    <div class="card-container p-4 bg-slate-900/50 h-32">
                        <h2 class="text-[10px] font-bold text-slate-500 uppercase mb-2 px-2">System Logs</h2>
                        <ul id="log-list" class="text-[11px] space-y-1 text-slate-400 overflow-y-auto font-mono"></ul>
                    </div>
                </div>
            </div>
        </div>

        <div id="stocks" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="stock-market-list"></div>
        </div>

        <div id="banking" class="tab-content space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="p-6 bg-slate-900 rounded-2xl border border-slate-800">
                    <div class="h-24 w-full card-gold rounded-xl mb-4"></div>
                    <h3 class="text-xl font-black">GOLD</h3>
                    <button onclick="purchaseCard('gold')" class="w-full mt-4 bg-white text-black py-2 rounded font-bold">$50,000</button>
                </div>
                <div class="p-6 bg-slate-900 rounded-2xl border border-slate-800">
                    <div class="h-24 w-full card-platinum rounded-xl mb-4"></div>
                    <h3 class="text-xl font-black">PLATINUM</h3>
                    <button onclick="purchaseCard('platinum')" class="w-full mt-4 bg-white text-black py-2 rounded font-bold">$1M</button>
                </div>
                <div class="p-6 bg-slate-900 rounded-2xl border border-slate-800">
                    <div class="h-24 w-full card-black rounded-xl mb-4"></div>
                    <h3 class="text-xl font-black">BLACK</h3>
                    <button onclick="purchaseCard('black')" class="w-full mt-4 bg-white text-black py-2 rounded font-bold">$100M</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        let gameState = {
            balance: 1000,
            netWorth: 1000,
            level: 1,
            xp: 0,
            xpToNext: 1000,
            lastClick: 0,
            stocks: [
                { id: 'AAPL', name: 'Apple', price: 180, owned: 0, volatility: 0.02, img: 'https://logo.clearbit.com/apple.com' },
                { id: 'NVDA', name: 'NVIDIA', price: 850, owned: 0, volatility: 0.06, img: 'https://logo.clearbit.com/nvidia.com' },
                { id: 'GOOGL', name: 'Google', price: 150, owned: 0, volatility: 0.02, img: 'https://logo.clearbit.com/google.com' },
                { id: 'MSFT', name: 'Microsoft', price: 410, owned: 0, volatility: 0.015, img: 'https://logo.clearbit.com/microsoft.com' },
                { id: 'META', name: 'Meta', price: 480, owned: 0, volatility: 0.04, img: 'https://logo.clearbit.com/meta.com' },
                { id: 'RBLX', name: 'Roblox', price: 40, owned: 0, volatility: 0.05, img: 'https://logo.clearbit.com/roblox.com' },
                { id: 'BBY', name: 'Best Buy', price: 80, owned: 0, volatility: 0.03, img: 'https://logo.clearbit.com/bestbuy.com' },
                { id: 'MCD', name: 'McDonalds', price: 295, owned: 0, volatility: 0.01, img: 'https://logo.clearbit.com/mcdonalds.com' },
                { id: 'PG', name: 'P&G', price: 160, owned: 0, volatility: 0.005, img: 'https://logo.clearbit.com/pg.com' },
                { id: 'SMSN', name: 'Samsung', price: 65, owned: 0, volatility: 0.025, img: 'https://logo.clearbit.com/samsung.com' },
                { id: 'OPEN', name: 'OpenAI', price: 500, owned: 0, volatility: 0.08, img: 'https://logo.clearbit.com/openai.com' },
                { id: 'BDNC', name: 'ByteDance', price: 320, owned: 0, volatility: 0.07, img: 'https://logo.clearbit.com/bytedance.com' }
            ]
        };

        function init() {
            const saved = localStorage.getItem('empireSave');
            if (saved) Object.assign(gameState, JSON.parse(saved));
            updateUI();
            setInterval(updateStocks, 4000);
        }

        function handleManualClick() {
            const now = Date.now();
            if (now - gameState.lastClick < 250) return;
            gameState.lastClick = now;
            gameState.balance += 10;
            gainXP(5);
            updateUI();
        }

        function gainXP(amount) {
            gameState.xp += amount;
            if(gameState.xp >= gameState.xpToNext) {
                gameState.xp = 0;
                gameState.level++;
                gameState.xpToNext *= 1.8;
                addLog(`Level Up: ${gameState.level}`);
            }
        }

        function updateStocks() {
            gameState.stocks.forEach(s => {
                s.price *= (1 + (Math.random() * s.volatility * 2 - s.volatility));
                if (s.price < 1) s.price = 1;
            });
            calculateNetWorth();
            renderStocks();
            updateUI();
        }

        function calculateNetWorth() {
            let stockVal = 0;
            gameState.stocks.forEach(s => stockVal += (s.owned * s.price));
            gameState.netWorth = gameState.balance + stockVal;
        }

        function buyStock(id) {
            const s = gameState.stocks.find(x => x.id === id);
            if (gameState.balance >= s.price) {
                gameState.balance -= s.price;
                s.owned++;
                addLog(`Bought ${s.id}`);
                updateUI();
            }
        }

        function sellStock(id) {
            const s = gameState.stocks.find(x => x.id === id);
            if (s.owned > 0) {
                gameState.balance += s.price;
                s.owned--;
                addLog(`Sold ${s.id}`);
                updateUI();
            }
        }

        function updateUI() {
            document.getElementById('balance-display').innerText = formatCurrency(gameState.balance);
            document.getElementById('networth-display').innerText = formatCurrency(gameState.netWorth);
            document.getElementById('legacy-level').innerText = gameState.level;
            document.getElementById('xp-text').innerText = `${Math.floor(gameState.xp)} / ${Math.floor(gameState.xpToNext)}`;
            document.getElementById('xp-fill').style.width = `${(gameState.xp / gameState.xpToNext) * 100}%`;
            localStorage.setItem('empireSave', JSON.stringify(gameState));
        }

        function renderStocks() {
            const container = document.getElementById('stock-market-list');
            if(!container) return;
            container.innerHTML = gameState.stocks.map(s => `
                <div class="card-container p-4 bg-slate-900/50">
                    <div class="flex items-center gap-3 mb-4">
                        <img src="${s.img}" class="w-10 h-10 rounded-lg bg-white p-1" onerror="this.src='https://via.placeholder.com/40'">
                        <div>
                            <h3 class="font-black text-xs text-white uppercase">${s.name}</h3>
                            <span class="text-[10px] text-slate-500 font-mono">${s.id}</span>
                        </div>
                    </div>
                    <div class="text-xl font-mono font-bold text-white mb-4">${formatCurrency(s.price)}</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="buyStock('${s.id}')" class="bg-white text-black py-1 rounded text-[10px] font-bold uppercase hover:bg-blue-400">Buy</button>
                        <button onclick="sellStock('${s.id}')" class="bg-slate-800 text-slate-300 py-1 rounded text-[10px] font-bold">Sell (${s.owned})</button>
                    </div>
                </div>
            `).join('');
        }

        function formatCurrency(n) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(n); }
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.btn-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        function addLog(m) {
            const l = document.getElementById('log-list');
            const e = document.createElement('li');
            e.innerText = `> ${m}`;
            l.prepend(e);
        }

        init();
    </script>
</body>
</html>
